spring.application.name=vendorpos

# Pengaturan Koneksi ke MySQL Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/db_transaksi_vendor?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pengaturan Hibernate / JPA (Agar tabel dibuat otomatis)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081