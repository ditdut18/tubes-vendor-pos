spring.application.name=vendorpos

# Pengaturan Koneksi ke MySQL Laragon
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_transaksi_vendor?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pengaturan Hibernate / JPA (Agar tabel dibuat otomatis)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration (Diuabah ke 8081 dan SSL dimatikan)
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# HTTPS local settings (Dinonaktifkan sementara)
server.ssl.enabled=false
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=vendorpos
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# JWT security settings
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyForLocalDevDontUseInProd1234567890123456_SuperSecureAndLongKeyForHS512}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=INFO
logging.level.com.tubes.vendorpos=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=target/spring.log

# Midtrans Configuration
# Gunakan variabel environment supaya key tidak hardcode.
# Contoh (Windows):
# set MIDTRANS_SERVER_KEY=SB-Mid-server-xxxxx
# set MIDTRANS_CLIENT_KEY=SB-Mid-client-xxxxx
# set MIDTRANS_IS_PRODUCTION=false
midtrans.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:}
midtrans.is-production=${MIDTRANS_IS_PRODUCTION:false}
