spring.application.name=vendorpos

# Pengaturan Koneksi ke MySQL Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/db_transaksi_vendor?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pengaturan Hibernate / JPA (Agar tabel dibuat otomatis)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8081
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.root=INFO
logging.level.com.tubes.vendorpos=DEBUG
logging.level.org.springframework.web=DEBUG